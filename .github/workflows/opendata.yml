name: Fetch Taipower OpenData

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. This runs every 10 minutes, offset from the hour.
    - cron: '3,13,23,33,43,53 * * * *'

permissions:
  contents: write

concurrency:
  group: taipower-opendata
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch OpenData
        env:
          NOTIFY_EMAIL_USER: ${{ secrets.NOTIFY_EMAIL_USER }}
          NOTIFY_EMAIL_PASS: ${{ secrets.NOTIFY_EMAIL_PASS }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
        run: python scripts/fetch_opendata.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add supply_demand genload region || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Taipower OpenData"
            git pull --rebase
            git push
          fi
