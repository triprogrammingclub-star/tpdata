name: Fetch Taipower Realtime Web Data

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. This runs every 10 minutes, offset from the hour.
    - cron: '5,15,25,35,45,55 * * * *'

permissions:
  contents: write

concurrency:
  group: taipower-realtime-web
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch realtime web data through Cloudflare Worker
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_TOKEN: ${{ secrets.WORKER_TOKEN }}
        run: python scripts/fetch_realtime.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add loadpara_json loadpara_txt genary genloadareaperc || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Taipower realtime web data"
            git pull --rebase
            git push
          fi
